<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HARVEST</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Фон-слайдер */
    .bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-size: cover;
        background-position: center;
        animation: slide 20s infinite;
    }

    @keyframes slide {
    0%   { background-image: url('img1.jpg.jpg'); }
    25%  { background-image: url('img2.jpg.jpg'); }
    50%  { background-image: url('img3.jpg.jpg'); }
    75%  { background-image: url('img4.jpg.png'); }
    100% { background-image: url('img5.jpg.png'); }
}
    }

    /* Центр */
    .center {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
    }

    .logo {
        width: 300px;
        margin-bottom: 40px;
        filter: drop-shadow(0 0 20px #fff);
    }

    .btn {
        display: inline-block;
        padding: 15px 40px;
        border: 2px solid #fff;
        color: #fff;
        text-decoration: none;
        font-size: 20px;
        letter-spacing: 3px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #fff;
        color: #000;
    }

    /* Видео снизу */
    .video {
        position: fixed;
        bottom: 0; left: 0;
        width: 100%;
        height: 30vh;
        object-fit: cover;
        z-index: 5;
        opacity: 0.4;
    }
</style>
</head>
<body>

<div class="bg"></div>

<div class="center">
    <img src="logo.png.png" class="logo">
    <a href="https://your-link-here" class="btn">ENTER HARVEST</a>
</div>

<video class="video" autoplay muted loop>
    <source src="video.mp4.mp4" type="video/mp4">
</video>

</body>
</html>
