<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HARVEST</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; background: #000; overflow-x: hidden; }

    /* Фон-слайдер */
    .bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-size: cover;
        background-position: center;
        animation: slide 20s infinite;
        z-index: 1;
    }

    @keyframes slide {
        0%   { background-image: url('img1.jpg.jpg'); }
        25%  { background-image: url('img2.jpg.jpg'); }
        50%  { background-image: url('img3.jpg.jpg'); }
        75%  { background-image: url('img4.jpg.png'); }
        100% { background-image: url('img5.jpg.png'); }
    }

    /* Центр: большой логотип */
    .center {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 3;
        text-align: center;
    }

    .logo {
        width: 600px; /* Увеличил логотип */
        max-width: 90vw;
        filter: drop-shadow(0 0 25px #fff);
    }

    /* Видео — полноразмерное */
    .video-wrapper {
        position: relative;
        margin-top: 100vh; /* чтобы видео было под фоном */
        width: 100%;
        background: #000;
        z-index: 4;
    }

    .video {
        width: 100%;
        height: auto; /* Полная высота без обрезания */
        display: block;
    }
</style>
</head>

<body>

<div class="bg"></div>

<div class="center">
    <img src="logo.png.png" class="logo">
</div>

<div class="video-wrapper">
    <video class="video" controls>
        <source src="video.mp4.mp4" type="video/mp4">
    </video>
</div>

</body>
</html>
